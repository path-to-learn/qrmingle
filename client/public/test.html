<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Test Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  
  <!-- Import using plain script tags to bypass Vite's processing -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  
  <script type="text/javascript">
    console.log('React test page loaded');
    console.log('React version:', React.version);
    console.log('ReactDOM version:', ReactDOM.version);
    
    // Simple React component without JSX
    function TestComponent() {
      return React.createElement(
        'div',
        { style: { padding: '20px', backgroundColor: '#f0f9ff', borderRadius: '8px', margin: '20px', fontFamily: 'Inter, sans-serif' } },
        React.createElement('h1', { style: { color: '#3b82f6' } }, 'React Test Component'),
        React.createElement('p', null, 'This is a simple test to verify React is working without using Vite or JSX.'),
        React.createElement('button', 
          { 
            onClick: function() { alert('React is working!'); },
            style: { 
              backgroundColor: '#3b82f6',
              color: 'white',
              padding: '8px 16px',
              border: 'none',
              borderRadius: '4px',
              cursor: 'pointer',
              marginTop: '10px'
            }
          }, 
          'Click Me'
        )
      );
    }
    
    // Mount the component
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(TestComponent));
  </script>
</body>
</html>
