<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QrMingle - Test QR Profile</title>
  <style>
    :root {
      --primary: #3B82F6;
      --primary-dark: #2563EB;
      --background: #f5f7fa;
      --text: #333;
      --text-light: #6b7280;
      --border: #e5e7eb;
      --card-bg: white;
      --card-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --success: #10b981;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--background);
      color: var(--text);
      line-height: 1.6;
      padding: 20px;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }
    .profile-card {
      background-color: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--card-shadow);
      margin-bottom: 2rem;
    }
    .profile-header {
      position: relative;
    }
    .profile-cover {
      height: 120px;
      background: linear-gradient(to right, var(--primary), var(--primary-dark));
    }
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid white;
      background-color: var(--background);
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .profile-avatar svg {
      width: 70%;
      height: 70%;
      color: var(--primary);
    }
    .profile-info {
      padding: 80px 20px 30px;
      text-align: center;
    }
    .profile-name {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
    }
    .profile-title {
      color: var(--text-light);
      font-size: 1rem;
      margin-bottom: 1.5rem;
    }
    .profile-bio {
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    .social-links {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0 auto 1.5rem;
    }
    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: rgba(59, 130, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      transition: all 0.2s;
    }
    .social-link:hover {
      background-color: var(--primary);
      color: white;
      transform: translateY(-3px);
    }
    .button {
      display: block;
      background-color: var(--primary);
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      width: 100%;
    }
    .button:hover {
      background-color: var(--primary-dark);
      transform: translateY(-2px);
    }
    .qr-section {
      background-color: var(--card-bg);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--card-shadow);
      text-align: center;
    }
    .qr-title {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .qr-code {
      width: 200px;
      height: 200px;
      margin: 0 auto 1.5rem;
      position: relative;
    }
    .qr-code::before, .qr-code::after {
      content: '';
      position: absolute;
      width: 80px;
      height: 80px;
      border: 10px solid var(--primary);
    }
    .qr-code::before {
      top: 0;
      left: 0;
      border-right: none;
      border-bottom: none;
    }
    .qr-code::after {
      bottom: 0;
      right: 0;
      border-left: none;
      border-top: none;
    }
    .qr-help {
      color: var(--text-light);
      font-size: 0.9rem;
      margin-top: 1rem;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: bold;
      color: var(--primary);
      display: flex;
      align-items: center;
    }
    .logo svg {
      margin-right: 0.5rem;
    }
    .back-link {
      color: var(--primary);
      text-decoration: none;
      display: flex;
      align-items: center;
      font-weight: 500;
    }
    .back-link svg {
      margin-right: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9h18v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z"></path>
          <path d="M3 9v1a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9"></path>
          <path d="M15 13v2"></path>
          <path d="M9 13v2"></path>
        </svg>
        QrMingle
      </div>
      <a href="/" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
        Back to Home
      </a>
    </header>

    <div class="profile-card">
      <div class="profile-header">
        <div class="profile-cover"></div>
        <div class="profile-avatar">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>
      <div class="profile-info">
        <h1 class="profile-name">John Doe</h1>
        <h2 class="profile-title">Software Developer & QR Enthusiast</h2>
        <p class="profile-bio">I'm passionate about creating digital networking solutions that make connections simpler and more meaningful. Let's connect!</p>
        
        <div class="social-links">
          <a href="#" class="social-link" title="LinkedIn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
              <rect width="4" height="12" x="2" y="9"></rect>
              <circle cx="4" cy="4" r="2"></circle>
            </svg>
          </a>
          <a href="#" class="social-link" title="Twitter">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"></path>
            </svg>
          </a>
          <a href="#" class="social-link" title="GitHub">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
              <path d="M9 18c-4.51 2-5-2-7-2"></path>
            </svg>
          </a>
          <a href="#" class="social-link" title="Email">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect width="20" height="16" x="2" y="4" rx="2"></rect>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
            </svg>
          </a>
        </div>
        
        <a href="#" class="button">Save Contact</a>
      </div>
    </div>

    <div class="qr-section">
      <h2 class="qr-title">Share Your Profile</h2>
      <div class="qr-code"></div>
      <p class="qr-help">Scan this QR code to instantly share your profile with others.</p>
    </div>
  </div>

  <script>
    // Demo functionality
    document.querySelector('.button').addEventListener('click', function(e) {
      e.preventDefault();
      alert('This is a demo of the QrMingle profile page. In the full application, this would save the contact to your device.');
    });

    // Track view (simulated)
    console.log('Profile view logged');
  </script>
</body>
</html>
