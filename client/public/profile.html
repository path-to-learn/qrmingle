<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QrMingle Profile</title>
  <style>
    :root {
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --background: #f5f7fa;
      --card: #ffffff;
      --text: #1f2937;
      --text-secondary: #4b5563;
      --border: #e5e7eb;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      margin: 0;
      padding: 0;
      color: var(--text);
      line-height: 1.6;
    }
    
    .container {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo {
      font-size: 2rem;
      font-weight: bold;
      color: var(--primary);
      margin-bottom: 8px;
    }
    
    .profile-card {
      background-color: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 32px;
      margin-bottom: 24px;
    }
    
    .profile-header {
      display: flex;
      align-items: center;
      margin-bottom: 24px;
    }
    
    .profile-photo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 24px;
      background-color: var(--border);
    }
    
    .profile-info h1 {
      margin: 0 0 4px 0;
      font-size: 1.8rem;
      color: var(--text);
    }
    
    .profile-info p {
      margin: 0;
      color: var(--text-secondary);
      font-size: 1.1rem;
    }
    
    .profile-bio {
      margin-bottom: 32px;
      color: var(--text-secondary);
    }
    
    .social-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }
    
    .social-link {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background-color: #f3f4f6;
      border-radius: 8px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    
    .social-link:hover {
      background-color: #e5e7eb;
    }
    
    .social-link img, .social-link svg {
      width: 20px;
      height: 20px;
      margin-right: 8px;
    }
    
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .button {
      padding: 10px 20px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    
    .button:hover {
      background-color: var(--primary-hover);
    }
    
    .button.secondary {
      background-color: #f3f4f6;
      color: var(--text);
    }
    
    .button.secondary:hover {
      background-color: #e5e7eb;
    }
    
    .button svg, .button img {
      width: 18px;
      height: 18px;
      margin-right: 8px;
    }
    
    .footer {
      text-align: center;
      margin-top: 40px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .footer a {
      color: var(--primary);
      text-decoration: none;
    }
    
    @media (max-width: 600px) {
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
      
      .profile-photo {
        margin-right: 0;
        margin-bottom: 16px;
      }
      
      .actions {
        flex-direction: column;
      }
      
      .button {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">QrMingle</div>
    </div>
    
    <div class="profile-card">
      <div class="profile-header">
        <img id="profile-photo" class="profile-photo" src="https://i.pravatar.cc/300" alt="Profile Photo">
        <div class="profile-info">
          <h1 id="profile-name">John Doe</h1>
          <p id="profile-title">Software Developer</p>
        </div>
      </div>
      
      <div id="profile-bio" class="profile-bio">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed euismod, nunc vel tincidunt lacinia, 
        nisl nisl aliquam nisl, vel aliquam nisl nisl sit amet nisl.
      </div>
      
      <div id="social-links" class="social-links">
        <!-- Social links will be inserted here by JavaScript -->
      </div>
      
      <div class="actions">
        <a id="save-contact" href="#" class="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
          </svg>
          Save Contact
        </a>
        <a href="/" class="button secondary">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
          Back to Home
        </a>
      </div>
    </div>
    
    <div class="footer">
      <p>Created with <a href="/">QrMingle</a> • © 2025</p>
    </div>
  </div>

  <script>
    // Default profile data (used as fallback)
    const defaultProfileData = {
      name: "Sample Profile",
      title: "QrMingle User",
      bio: "This is a sample profile. Create your own at QrMingle.",
      photoUrl: "",
      socialLinks: [
        { platform: "Website", url: "/", icon: "globe" }
      ]
    };

    // Function to render profile data
    function renderProfile(profile) {
      document.getElementById('profile-name').textContent = profile.name;
      document.getElementById('profile-title').textContent = profile.title;
      document.getElementById('profile-bio').textContent = profile.bio;
      
      if (profile.photoUrl) {
        document.getElementById('profile-photo').src = profile.photoUrl;
        document.getElementById('profile-photo').alt = profile.name;
      }
      
      // Generate social links
      const socialLinksContainer = document.getElementById('social-links');
      socialLinksContainer.innerHTML = '';
      
      profile.socialLinks.forEach(link => {
        const linkElement = document.createElement('a');
        linkElement.href = link.url;
        linkElement.className = 'social-link';
        linkElement.target = '_blank';
        linkElement.rel = 'noopener noreferrer';
        
        // Simple icon rendering - in a real app you'd use proper icons
        let iconSvg = '';
        switch(link.icon.toLowerCase()) {
          case 'linkedin':
            iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>';
            break;
          case 'twitter':
            iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"></path></svg>';
            break;
          case 'globe':
            iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>';
            break;
          default:
            iconSvg = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle></svg>';
        }
        
        linkElement.innerHTML = iconSvg + link.platform;
        socialLinksContainer.appendChild(linkElement);
      });
      
      // Set up vCard download
      document.getElementById('save-contact').addEventListener('click', function(e) {
        e.preventDefault();
        
        // Create a vCard
        const vCard = `BEGIN:VCARD
VERSION:3.0
FN:${profile.name}
TITLE:${profile.title}
NOTE:${profile.bio}
URL:${profile.socialLinks[0]?.url || ''}
END:VCARD`;
        
        // Create download link
        const blob = new Blob([vCard], { type: 'text/vcard' });
        const url = URL.createObjectURL(blob);
        
        const link = document.createElement('a');
        link.download = `${profile.name.replace(/\s+/g, '-').toLowerCase()}.vcf`;
        link.href = url;
        link.click();
        
        // Clean up
        URL.revokeObjectURL(url);
      });
    }

    // Load profile data from server or use default data
    function loadProfileData() {
      // Get parameters from URL - e.g., /profile.html?slug=jane-smith&name=Jane&title=Designer&load=true
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('slug');
      const name = urlParams.get('name');
      const title = urlParams.get('title');
      const shouldLoad = urlParams.get('load') === 'true';
      
      if (slug) {
        // Create a basic profile with the URL parameters
        const basicProfile = {
          name: name || 'QrMingle User',
          title: title || '',
          bio: 'Loading profile information...',
          photoUrl: '',
          socialLinks: []
        };
        
        // Render the basic profile immediately for a faster experience
        renderProfile(basicProfile);
        
        if (shouldLoad) {
          console.log(`Fetching profile data for slug: ${slug}`);
          
          // Fetch the full profile data from API
          fetch(`/api/profiles/slug/${slug}`)
            .then(response => {
              if (!response.ok) {
                throw new Error('Profile not found or server error');
              }
              return response.json();
            })
            .then(profileData => {
              console.log('Profile data loaded:', profileData);
              
              // Map the API response to our profile format
              const profile = {
                name: profileData.displayName,
                title: profileData.title || '',
                bio: profileData.bio || '',
                photoUrl: profileData.photoUrl || '',
                socialLinks: profileData.socialLinks.map(link => ({
                  platform: link.platform,
                  url: link.url,
                  icon: link.platform.toLowerCase()
                }))
              };
              
              // Update the rendered profile with complete data
              renderProfile(profile);
            })
            .catch(error => {
              console.error('Error loading profile:', error);
              // Show error state but keep the basic profile visible
              document.getElementById('profile-bio').textContent = 
                'There was an error loading the complete profile information.';
            });
        }
      } else {
        // No slug provided, use default data
        console.log('No slug provided, using default profile data');
        renderProfile(defaultProfileData);
      }
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadProfileData);
    
    // Handle error case where profileData is not defined
    if (typeof profileData === 'undefined') {
      var profileData = defaultProfileData;
    }
  </script>
</body>
</html>
