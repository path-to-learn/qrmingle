<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with lighter gradient -->
  <rect width="512" height="512" rx="256" fill="url(#paint0_linear)"/>
  
  <!-- QR code elements (simplified and colorful) -->
  <g opacity="0.9">
    <!-- Top left position pattern -->
    <rect x="144" y="144" width="80" height="80" rx="16" fill="#FFFFFF"/>
    <rect x="160" y="160" width="48" height="48" rx="8" fill="#FF7070"/>
    
    <!-- Top right position pattern -->
    <rect x="288" y="144" width="80" height="80" rx="16" fill="#FFFFFF"/>
    <rect x="304" y="160" width="48" height="48" rx="8" fill="#7EE787"/>
    
    <!-- Bottom left position pattern -->
    <rect x="144" y="288" width="80" height="80" rx="16" fill="#FFFFFF"/>
    <rect x="160" y="304" width="48" height="48" rx="8" fill="#79C0FF"/>
    
    <!-- Central elements - colorful squares -->
    <rect x="240" y="144" width="32" height="32" rx="6" fill="#F8F77E"/>
    <rect x="240" y="192" width="32" height="32" rx="6" fill="#F8F77E"/>
    <rect x="240" y="240" width="32" height="32" rx="6" fill="#F8F77E"/>
    <rect x="240" y="288" width="32" height="32" rx="6" fill="#F8F77E"/>
    <rect x="240" y="336" width="32" height="32" rx="6" fill="#F8F77E"/>
    
    <rect x="288" y="240" width="32" height="32" rx="6" fill="#D876E3"/>
    <rect x="336" y="240" width="32" height="32" rx="6" fill="#D876E3"/>
    
    <rect x="144" y="240" width="32" height="32" rx="6" fill="#61E2C7"/>
    <rect x="192" y="240" width="32" height="32" rx="6" fill="#61E2C7"/>
    
    <!-- Bottom decorative elements -->
    <rect x="288" y="336" width="32" height="32" rx="6" fill="#FF9E40"/>
    <rect x="336" y="336" width="32" height="32" rx="6" fill="#FF9E40"/>
    <rect x="336" y="288" width="32" height="32" rx="6" fill="#FF9E40"/>
  </g>
  
  <!-- Connecting elements - light curves -->
  <path d="M120 196C120 238.66 146.34 276 189 276" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M392 196C392 238.66 365.66 276 323 276" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 408C299.66 408 336 390.33 336 346.67" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M256 408C212.34 408 176 390.33 176 346.67" stroke="white" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Text with colorful gradient -->
  <text x="256" y="452" font-family="Arial, sans-serif" font-size="40" font-weight="bold" text-anchor="middle" fill="url(#textGradient)">QrMingle</text>
  
  <!-- Sparkles -->
  <circle cx="136" cy="136" r="4" fill="white"/>
  <circle cx="376" cy="136" r="4" fill="white"/>
  <circle cx="136" cy="376" r="4" fill="white"/>
  <circle cx="376" cy="376" r="4" fill="white"/>
  <circle cx="256" cy="88" r="6" fill="white"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6FDBFF"/>
      <stop offset="100%" stop-color="#4A87FF"/>
    </linearGradient>
    
    <linearGradient id="textGradient" x1="100" y1="452" x2="412" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#F0F4FF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
