    <linearGradient id="blue-gradient-3" x1="166" y1="286" x2="226" y2="346" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    
    <linearGradient id="blue-gradient-4" x1="246" y1="166" x2="266" y2="346" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#93C5FD"/>
