<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <circle cx="256" cy="256" r="240" fill="url(#background-gradient)"/>
  
  <!-- QR code outer frame -->
  <rect x="130" y="130" width="252" height="252" rx="24" stroke="url(#border-gradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- QR code pattern elements -->
  <rect x="166" y="166" width="60" height="60" rx="8" fill="url(#blue-gradient-1)"/>
  <rect x="286" y="166" width="60" height="60" rx="8" fill="url(#blue-gradient-2)"/>
  <rect x="166" y="286" width="60" height="60" rx="8" fill="url(#blue-gradient-3)"/>
  
  <!-- QR code inner elements -->
  <rect x="176" y="176" width="40" height="40" rx="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="296" y="176" width="40" height="40" rx="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="176" y="296" width="40" height="40" rx="4" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Center sections of QR code -->
  <rect x="246" y="166" width="20" height="60" fill="url(#blue-gradient-4)"/>
  <rect x="246" y="246" width="20" height="20" fill="url(#blue-gradient-4)"/>
  <rect x="246" y="286" width="20" height="20" fill="url(#blue-gradient-4)"/>
  <rect x="246" y="326" width="20" height="20" fill="url(#blue-gradient-4)"/>
  
  <rect x="166" y="246" width="20" height="20" fill="url(#blue-gradient-5)"/>
  <rect x="206" y="246" width="20" height="20" fill="url(#blue-gradient-5)"/>
  <rect x="286" y="246" width="20" height="20" fill="url(#blue-gradient-5)"/>
  <rect x="326" y="246" width="20" height="20" fill="url(#blue-gradient-5)"/>
  
  <rect x="286" y="286" width="60" height="20" fill="url(#blue-gradient-6)"/>
  <rect x="286" y="326" width="20" height="20" fill="url(#blue-gradient-6)"/>
  <rect x="326" y="326" width="20" height="20" fill="url(#blue-gradient-6)"/>
  
  <!-- Mingle elements representing connection -->
  <path d="M382 196 A120 120 0 0 1 382 316" stroke="url(#line-gradient-1)" stroke-width="8" stroke-linecap="round"/>
  <path d="M130 316 A120 120 0 0 1 130 196" stroke="url(#line-gradient-2)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Shine effects -->
  <circle cx="196" cy="176" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="316" cy="176" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="196" cy="296" r="8" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Text (stylized as part of the logo) -->
  <text x="256" y="420" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#FFFFFF" text-anchor="middle">QrMingle</text>
  
  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="background-gradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4A6CF7"/>
