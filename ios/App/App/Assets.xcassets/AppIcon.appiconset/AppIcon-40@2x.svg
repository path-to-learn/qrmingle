
<svg width="80" height="80" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="80" height="80" rx="17.6" fill="url(#grad)"/>
  
  <!-- QR Code representation -->
  <g transform="translate(16, 16)">
    <rect x="0" y="0" width="48" height="48" rx="4" fill="white" fill-opacity="0.95"/>
    
    <!-- QR corner markers -->
    <rect x="4" y="4" width="12" height="12" rx="1.6" fill="#4F46E5"/>
    <rect x="32" y="4" width="12" height="12" rx="1.6" fill="#4F46E5"/>
    <rect x="4" y="32" width="12" height="12" rx="1.6" fill="#4F46E5"/>
    
    <!-- QR data dots -->
    <rect x="20" y="6.4" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="25.6" y="6.4" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="20" y="12" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="25.6" y="20" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="6.4" y="20" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="33.6" y="20" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="20" y="25.6" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="25.6" y="33.6" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="33.6" y="33.6" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="38.4" y="25.6" width="2.4" height="2.4" fill="#4F46E5"/>
    <rect x="20" y="38.4" width="2.4" height="2.4" fill="#4F46E5"/>
  </g>
  
  <text x="40" y="72" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, Arial" font-size="6.4" font-weight="600" fill="white">QrMingle</text>
</svg>