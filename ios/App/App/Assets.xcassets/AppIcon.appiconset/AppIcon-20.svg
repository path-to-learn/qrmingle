
<svg width="20" height="20" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="20" height="20" rx="4.4" fill="url(#grad)"/>
  
  <!-- QR Code representation -->
  <g transform="translate(4, 4)">
    <rect x="0" y="0" width="12" height="12" rx="1" fill="white" fill-opacity="0.95"/>
    
    <!-- QR corner markers -->
    <rect x="1" y="1" width="3" height="3" rx="0.4" fill="#4F46E5"/>
    <rect x="8" y="1" width="3" height="3" rx="0.4" fill="#4F46E5"/>
    <rect x="1" y="8" width="3" height="3" rx="0.4" fill="#4F46E5"/>
    
    <!-- QR data dots -->
    <rect x="5" y="1.6" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="6.4" y="1.6" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="5" y="3" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="6.4" y="5" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="1.6" y="5" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="8.4" y="5" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="5" y="6.4" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="6.4" y="8.4" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="8.4" y="8.4" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="9.6" y="6.4" width="0.6" height="0.6" fill="#4F46E5"/>
    <rect x="5" y="9.6" width="0.6" height="0.6" fill="#4F46E5"/>
  </g>
  
  
</svg>