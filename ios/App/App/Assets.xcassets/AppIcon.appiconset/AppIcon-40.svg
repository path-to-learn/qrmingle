
<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="40" height="40" rx="8.8" fill="url(#grad)"/>
  
  <!-- QR Code representation -->
  <g transform="translate(8, 8)">
    <rect x="0" y="0" width="24" height="24" rx="2" fill="white" fill-opacity="0.95"/>
    
    <!-- QR corner markers -->
    <rect x="2" y="2" width="6" height="6" rx="0.8" fill="#4F46E5"/>
    <rect x="16" y="2" width="6" height="6" rx="0.8" fill="#4F46E5"/>
    <rect x="2" y="16" width="6" height="6" rx="0.8" fill="#4F46E5"/>
    
    <!-- QR data dots -->
    <rect x="10" y="3.2" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="12.8" y="3.2" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="10" y="6" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="12.8" y="10" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="3.2" y="10" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="16.8" y="10" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="10" y="12.8" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="12.8" y="16.8" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="16.8" y="16.8" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="19.2" y="12.8" width="1.2" height="1.2" fill="#4F46E5"/>
    <rect x="10" y="19.2" width="1.2" height="1.2" fill="#4F46E5"/>
  </g>
  
  
</svg>